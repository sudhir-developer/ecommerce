name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm" # 🔥 faster builds

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint || true # optional

      - name: Build Project
        run: npm run build

      # Run tests only if available
      - name: Run Tests
        run: npm test --if-present
